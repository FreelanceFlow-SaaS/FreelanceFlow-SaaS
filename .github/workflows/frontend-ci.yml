# Frontend CI/CD (Story 6.2 — monorepo: jobs run from repo root, app in frontend/)
# Branch flow: feature/* → develop → staging → main (see root README.md).

name: Frontend CI

on:
  pull_request:
    branches: [develop, main, staging]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [develop, staging, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: "0"
  NODE_VERSION: "22"

jobs:
  quality-and-build:
    name: Install, lint, format, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Next.js build
        run: npm run build

  docker:
    name: Docker image (Story 6.1 Dockerfile)
    runs-on: ubuntu-latest
    needs: quality-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t frontend:ci-${{ github.sha }} -f frontend/Dockerfile frontend

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: docker
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}-frontend
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LOWER}:${GITHUB_SHA}" -t "${IMAGE_LOWER}:latest" -f frontend/Dockerfile frontend
          docker push "${IMAGE_LOWER}:${GITHUB_SHA}"
          docker push "${IMAGE_LOWER}:latest"
